<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة طلاب الأستاذ ياسر حميد</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5832/5832416.png">
    
    <style>
        :root { --primary: #1a2a6c; --gold: #b21f1f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; -webkit-tap-highlight-color: transparent; }
        
        .header { background: linear-gradient(to left, #1a2a6c, #2a4858); color: white; padding: 25px; text-align: center; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .header h1 { margin: 0; font-size: 22px; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }

        /* قائمة الصفوف - تمرير أفقي */
        .tabs-container { overflow-x: auto; white-space: nowrap; margin-bottom: 20px; padding: 5px; -webkit-overflow-scrolling: touch; }
        .tab-btn { display: inline-block; background: white; border: 1px solid var(--primary); padding: 10px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-left: 8px; color: var(--primary); transition: 0.3s; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        /* الجدول */
        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: var(--primary); }
        .paid-status { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .full { background: #d4edda; color: #155724; }
        .part { background: #fff3cd; color: #856404; }

        /* ملخص الحسابات */
        .summary-card { background: white; padding: 18px; border-radius: 12px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; border-right: 6px solid #1a2a6c; }
        .total-box { text-align: center; }
        .total-box span { display: block; font-size: 11px; color: #666; }
        .total-box b { font-size: 16px; color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h1>لوحة إدارة الدورات الإلكترونية</h1>
    <p>الأستاذ ياسر حميد</p>
</div>

<div class="tabs-container">
    <button class="tab-btn active" onclick="showGrade('p6', this)">6 ابتدائي</button>
    <button class="tab-btn" onclick="showGrade('m1', this)">1 متوسط</button>
    <button class="tab-btn" onclick="showGrade('m2', this)">2 متوسط</button>
    <button class="tab-btn" onclick="showGrade('m3', this)">3 متوسط</button>
    <button class="tab-btn" onclick="showGrade('h4', this)">4 إعدادي</button>
    <button class="tab-btn" onclick="showGrade('h5', this)">5 إعدادي</button>
    <button class="tab-btn" onclick="showGrade('h6', this)">6 إعدادي</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>اسم الطالب</th>
                <th>واصل</th>
                <th>متبقي</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<div class="summary-card">
    <div class="total-box">
        <span>سعر الدورة</span>
        <b id="coursePrice">0</b>
    </div>
    <div class="total-box">
        <span>إجمالي المقبوض</span>
        <b id="totalCollected">0</b>
    </div>
</div>

<script>
    // --- بيانات الطلاب المعدلة حسب طلبك ---
    const config = {
        p6: { price: 50, students: [
            {n: "محمد جاسم", p: 50, r: 0}, {n: "علي حسين", p: 30, r: 20}
        ]},
        m1: { price: 75, students: [
            {n: "زيد خالد", p: 75, r: 0}, {n: "فاطمة حيدر", p: 50, r: 25}
        ]},
        m2: { price: 75, students: [
            {n: "مرتضى علي", p: 75, r: 0}
        ]},
        m3: { price: 100, students: [
            {n: "ياسر عمار", p: 100, r: 0}, {n: "ليلى حسن", p: 60, r: 40}
        ]},
        h4: { price: 100, students: [
            {n: "جعفر صادق", p: 100, r: 0}
        ]},
        h5: { price: 100, students: [
            {n: "مصطفى طه", p: 50, r: 50}
        ]},
        h6: { price: 125, students: [
            {n: "إبراهيم وليد", p: 125, r: 0}, {n: "سجاد عباس", p: 75, r: 50}
        ]}
    };

    function showGrade(gradeKey, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const data = config[gradeKey];
        const tableBody = document.getElementById('studentTable');
        let totalPaid = 0;

        tableBody.innerHTML = "";
        data.students.forEach(s => {
            totalPaid += s.p;
            tableBody.innerHTML += `
                <tr>
                    <td>${s.n}</td>
                    <td>${s.p} ألف</td>
                    <td>${s.r} ألف</td>
                    <td><span class="paid-status ${s.r === 0 ? 'full' : 'part'}">
                        ${s.r === 0 ? 'مكتمل' : 'نقص'}
                    </span></td>
                </tr>
            `;
        });

        document.getElementById('coursePrice').innerText = data.price + " ألف";
        document.getElementById('totalCollected').innerText = totalPaid + " ألف د.ع";
    }

    // تشغيل أول صف تلقائياً
    showGrade('p6', document.querySelector('.tab-btn'));
</script>

</body>
</html>
