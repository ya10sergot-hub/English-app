<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة طلاب الأستاذ</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        
        /* أزرار الصفوف */
        .tabs { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: white; border: 2px solid var(--primary); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* الجدول */
        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; color: var(--primary); }
        .paid { color: white; background: #27ae60; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
        .unpaid { color: white; background: #e74c3c; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
        
        /* ملخص مالي */
        .summary { background: #fff; padding: 15px; border-radius: 10px; margin-top: 20px; border-right: 5px solid var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <h1>لوحة إدارة الدورات</h1>
    <p>الأستاذ علي جبار حسين</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showGrade('primary6', this)">سادس ابتدائي</button>
    <button class="tab-btn" onclick="showGrade('middle3', this)">ثالث متوسط</button>
    <button class="tab-btn" onclick="showGrade('high6', this)">سادس إعدادي</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>اسم الطالب</th>
                <th>المبلغ المدفوع</th>
                <th>المتبقي</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="studentTable">
            </tbody>
    </table>
</div>

<div class="summary" id="gradeSummary">
    </div>

<script>
    // قاعدة بيانات الطلاب (يمكنك إضافة مئات الأسماء هنا)
    const studentsData = {
        primary6: [
            { name: "أحمد علي", paid: 50000, remaining: 25000, status: "partial" },
            { name: "سارة محمد", paid: 75000, remaining: 0, status: "full" }
        ],
        middle3: [
            { name: "حيدر جاسم", paid: 100000, remaining: 0, status: "full" }
        ],
        high6: [
            { name: "مرتضى كريم", paid: 50000, remaining: 100000, status: "partial" }
        ]
    };

    function showGrade(grade, btn) {
        // تحديث الأزرار
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tableBody = document.getElementById('studentTable');
        const summaryDiv = document.getElementById('gradeSummary');
        const students = studentsData[grade];
        
        tableBody.innerHTML = "";
        let totalPaid = 0;

        students.forEach(s => {
            totalPaid += s.paid;
            tableBody.innerHTML += `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.paid.toLocaleString()} د.ع</td>
                    <td>${s.remaining.toLocaleString()} د.ع</td>
                    <td><span class="${s.status === 'full' ? 'paid' : 'unpaid'}">
                        ${s.status === 'full' ? 'مكتمل' : 'نقص'}
                    </span></td>
                </tr>
            `;
        });

        summaryDiv.innerHTML = `<strong>إجمالي مبالغ هذا الصف:</strong> ${totalPaid.toLocaleString()} دينار عراقي`;
    }

    // تشغيل الصف الأول تلقائياً عند الفتح
    showGrade('primary6', document.querySelector('.tab-btn'));
</script>

</body>
</html>
